<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome, Anushka!</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7ff, #dfe9ff);
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      max-width: 600px;
      width: 90%;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      text-align: center;
    }
    h1 {
      color: #4a6cf7;
      margin-bottom: 10px;
    }
    p {
      line-height: 1.7;
      margin: 16px 0;
      color: #555;
    }
    .highlight {
      color: #d83b01;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome, Anushka!</h1>
    <p>Here is your sample welcome homepage. This page is a simple example for beginners learning HTML.</p>
    <p>Use this page to add your name, change the greeting, or build your first personal website!</p>
    <p class="highlight">Hello, Anushka! Have a great day learning web design.</p>
  </div>
</body>
</html>
